CONFIG_ZMK_KEYBOARD_NAME="Kusa046RB"

# CONFIG_NFCT_PINS_AS_GPIOS=y
CONFIG_ZMK_BLE=n
CONFIG_ZMK_USB=y

CONFIG_EC11=y
#CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y
CONFIG_EC11_TRIGGER_OWN_THREAD=y
CONFIG_EC11_THREAD_PRIORITY=10
CONFIG_EC11_THREAD_STACK_SIZE=2048

CONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=3
CONFIG_ZMK_KSCAN_DEBOUNCE_RELEASE_MS=3

CONFIG_ZMK_KSCAN_CHARLIEPLEX_WAIT_BEFORE_INPUTS=1
CONFIG_ZMK_KSCAN_CHARLIEPLEX_WAIT_BETWEEN_OUTPUTS=0

# encorder bug taisaku
# CONFIG_ZMK_DRIVER_SENSOR_DEBOUNCE_MS=50

# freeze taisaku
CONFIG_ZMK_USB_LOGGING=n
CONFIG_LOG=n
CONFIG_ZMK_BATTERY_REPORTING=n

# stabilizer
CONFIG_INPUT_THREAD_STACK_SIZE=4096
CONFIG_PMW3610_ALT_REPORT_INTERVAL_MIN=20
CONFIG_SPI_ASYNC=n
CONFIG_PMW3610_ALT_INIT_POWER_UP_EXTRA_DELAY_MS=300
CONFIG_SPI_NRFX=y
CONFIG_SPI_NRFX_RAM_BUFFER_SIZE=32
CONFIG_WATCHDOG=y

# badjeff's PMW3610 driver

CONFIG_SPI=y
CONFIG_INPUT=y
CONFIG_ZMK_POINTING=y
CONFIG_PMW3610_ALT=y
CONFIG_PMW3610_ALT_SWAP_XY=y // <-- deprecated, use swap-xy; instead
# CONFIG_PMW3610_ALT_INVERT_X=y // <-- deprecated, use invert-x; instead
# CONFIG_PMW3610_ALT_INVERT_Y=y // <-- deprecated, use invert-y; instead
# CONFIG_PMW3610_ALT_REPORT_INTERVAL_MIN=12
# CONFIG_PMW3610_ALT_LOG_LEVEL_DBG=y
# CONFIG_PMW3610_ALT_INIT_POWER_UP_EXTRA_DELAY_MS=300 // <--see Troubleshooting