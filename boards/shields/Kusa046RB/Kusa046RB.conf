CONFIG_ZMK_KEYBOARD_NAME="Kusa046RB"

# CONFIG_NFCT_PINS_AS_GPIOS=y
CONFIG_ZMK_BLE=y
CONFIG_ZMK_USB=y

CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

CONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=10
CONFIG_ZMK_KSCAN_DEBOUNCE_RELEASE_MS=15

CONFIG_ZMK_KSCAN_CHARLIEPLEX_WAIT_BEFORE_INPUTS=10
CONFIG_ZMK_KSCAN_CHARLIEPLEX_WAIT_BETWEEN_OUTPUTS=20

# freeze wo nantoka suru
CONFIG_ZMK_USB_LOGGING=n
CONFIG_LOG=n
CONFIG_ZMK_BATTERY_REPORTING=n
CONFIG_BT_PERIPHERAL_PREF_MIN_INT=6
CONFIG_BT_PERIPHERAL_PREF_MAX_INT=12
CONFIG_BT_PERIPHERAL_PREF_LATENCY=30
CONFIG_BT_PERIPHERAL_PREF_TIMEOUT=400

# stabilizer
CONFIG_INPUT_THREAD_STACK_SIZE=4096
CONFIG_PMW3610_ALT_REPORT_INTERVAL_MIN=20
CONFIG_SPI_ASYNC=n
CONFIG_PMW3610_ALT_INIT_POWER_UP_EXTRA_DELAY_MS=300
CONFIG_SPI_NRFX=y
CONFIG_SPI_NRFX_RAM_BUFFER_SIZE=32
CONFIG_WATCHDOG=y

